<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baixar PDF</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    text-align: center;
    padding-top: 100px;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    margin: auto;
}

h1 {
    margin-bottom: 10px;
}

p {
    margin-bottom: 30px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #00ffaa;
}
</style>
</head>

<body>

<div class="container">
    <h1>📄 Download do PDF</h1>
    <p>Clique no botão abaixo para baixar o arquivo.</p>

    <a href="arquivo.pdf" download="arquivo.pdf">
        <button>⬇️ Baixar Agora</button>
    </a>
</div>

</body>
</html>
